server:
  port: ${PORT:5000}

spring:
  application:
    name: knowledge-guru-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/knowledge-guru}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  client-url: ${CLIENT_URL:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_dev_only_secret_key_min_32_characters_long}
    refresh-secret: ${JWT_REFRESH_SECRET:CHANGE_ME_dev_only_refresh_secret_min_32_chars}
    expires-in-minutes: ${JWT_EXPIRES_IN_MINUTES:15}
    refresh-expires-in-days: ${JWT_REFRESH_EXPIRES_IN_DAYS:30}
  bcrypt-rounds: ${BCRYPT_ROUNDS:12}
  email-from: ${EMAIL_FROM:noreply@knowledgeguru.app}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash
  rate-limit:
    window-minutes: ${RATE_LIMIT_WINDOW:15}
    max: ${RATE_LIMIT_MAX:100}

logging:
  level:
    root: INFO
    com.knowledgeguru: DEBUG
